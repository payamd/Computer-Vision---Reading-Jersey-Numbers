
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Top 3 Most Detected Players</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom Styles -->
    <style>
        body {
            background: linear-gradient(to right, #4e54c8, #8f94fb);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .card {
            border-radius: 1rem;
            background-color: rgba(255, 255, 255, 0.95);
            color: #333;
            max-width: 500px;
            width: 100%;
            padding: 20px;
        }

        h1 {
            font-weight: 700;
            margin-bottom: 20px;
        }

        ol {
            padding-left: 20px;
        }

        .btn {
            background-color: #4e54c8;
            color: #fff;
            text-decoration: none;
        }

        .btn:hover {
            background-color: #8f94fb;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-lg">
        <h1 class="text-center text-primary">Top 3 Most Detected Players</h1>
        <ol>
            {% for name, count in top_players %}
                <li>{{ name }} — {{ count }} times</li>
            {% endfor %}
        </ol>
        <div class="d-grid">
            <a href="/" class="btn btn-primary text-center">Go Back</a>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
